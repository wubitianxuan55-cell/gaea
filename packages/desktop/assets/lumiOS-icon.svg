<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Core gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="35%" stop-color="#c084fc"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Subtle ambient -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <!-- Facet gradients -->
    <linearGradient id="facetTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="facetLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="facetRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Center light -->
    <radialGradient id="centerLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0abfc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square (macOS/Win11 style) -->
  <rect x="64" y="64" width="896" height="896" rx="192" ry="192"
        fill="#0f0720" stroke="#2d1b4e" stroke-width="2"/>

  <!-- Ambient glow behind crystal -->
  <circle cx="512" cy="420" r="300" fill="url(#ambientGlow)"/>

  <!-- Outer orbital ring -->
  <g filter="url(#softGlow)" opacity="0.4">
    <ellipse cx="512" cy="480" rx="260" ry="100"
             fill="none" stroke="url(#ringGrad)" stroke-width="3"
             transform="rotate(-15 512 480)"/>
  </g>

  <!-- Second orbital ring -->
  <g filter="url(#glow)" opacity="0.25">
    <ellipse cx="512" cy="450" rx="200" ry="80"
             fill="none" stroke="#818cf8" stroke-width="2"
             transform="rotate(25 512 450)"/>
  </g>

  <!-- Main crystal prism -->
  <g filter="url(#glow)">
    <!-- Top facet -->
    <polygon points="512,140 340,380 684,380"
             fill="url(#facetTop)" opacity="0.95"/>
    <!-- Left facet -->
    <polygon points="340,380 512,680 684,380"
             fill="none"/>
    <!-- Split into two bottom facets for 3D effect -->
    <polygon points="340,380 240,560 512,680"
             fill="url(#facetLeft)" opacity="0.9"/>
    <polygon points="684,380 784,560 512,680"
             fill="url(#facetRight)" opacity="0.85"/>
    <!-- Bottom closure -->
    <polygon points="240,560 512,680 784,560"
             fill="#4c1d95" opacity="0.5"/>
  </g>

  <!-- Crystal edges (sharp lines) -->
  <g stroke="#f0abfc" stroke-width="1.5" opacity="0.5" fill="none">
    <line x1="512" y1="140" x2="340" y2="380"/>
    <line x1="512" y1="140" x2="684" y2="380"/>
    <line x1="340" y1="380" x2="512" y2="680"/>
    <line x1="684" y1="380" x2="512" y2="680"/>
    <line x1="340" y1="380" x2="240" y2="560"/>
    <line x1="684" y1="380" x2="784" y2="560"/>
    <line x1="240" y1="560" x2="512" y2="680"/>
    <line x1="784" y1="560" x2="512" y2="680"/>
  </g>

  <!-- Inner Lumi "L" monogram -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Stylized L formed by two intersecting light beams -->
    <line x1="430" y1="340" x2="430" y2="510" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <line x1="430" y1="510" x2="530" y2="510" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <!-- Dot accent at the corner -->
    <circle cx="430" cy="510" r="8" fill="#22d3ee"/>
  </g>

  <!-- Center bright point -->
  <circle cx="430" cy="430" r="60" fill="url(#centerLight)" filter="url(#glow)"/>

  <!-- Floating light particles -->
  <g fill="#f0abfc" filter="url(#glow)">
    <circle cx="590" cy="280" r="4" opacity="0.7"/>
    <circle cx="650" cy="350" r="3" opacity="0.5"/>
    <circle cx="330" cy="450" r="3" opacity="0.6"/>
    <circle cx="480" cy="200" r="2.5" opacity="0.5"/>
    <circle cx="280" cy="380" r="3.5" opacity="0.4"/>
    <circle cx="700" cy="500" r="2" opacity="0.5"/>
    <circle cx="350" cy="600" r="2.5" opacity="0.4"/>
    <circle cx="550" cy="620" r="3" opacity="0.5"/>
  </g>

  <!-- Neural connection dots along bottom -->
  <g fill="#818cf8" opacity="0.6">
    <circle cx="300" cy="620" r="3"/>
    <circle cx="360" cy="640" r="2.5"/>
    <circle cx="420" cy="650" r="3"/>
    <circle cx="500" cy="645" r="2.5"/>
    <circle cx="580" cy="635" r="3"/>
    <circle cx="660" cy="620" r="2.5"/>
    <circle cx="720" cy="600" r="3"/>
  </g>

  <!-- Connecting neural lines -->
  <g stroke="#818cf8" stroke-width="1.5" opacity="0.3" fill="none">
    <polyline points="300,620 360,640 420,650 500,645 580,635 660,620 720,600"/>
  </g>
</svg>
