<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="gaeaW">
  <title>gaeaW</title>
  <defs>
    <linearGradient id="w-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- 背景：白色圆角方形 + 浅灰细边框 -->
  <rect width="1024" height="1024" rx="224" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="3"/>

  <!-- 山形 W — 4 块平行四边形，teal 渐变 -->
  <g fill="url(#w-grad)" stroke="url(#w-grad)" stroke-width="1.5" stroke-linejoin="round">
    <!-- 块 1：左外侧 — 底部 → 左峰 -->
    <polygon points="208,470 272,470 402,220 338,220" />
    <!-- 块 2：左内侧 — 左峰 → 谷底 -->
    <polygon points="370,240 434,240 540,470 476,470" />
    <!-- 块 3：右内侧 — 谷底 → 右峰 -->
    <polygon points="556,470 620,470 654,240 590,240" />
    <!-- 块 4：右外侧 — 右峰 → 底部 -->
    <polygon points="622,240 686,240 816,470 752,470" />
  </g>

  <!-- 地层线（两条水平 semi-transparent teal 线） -->
  <g stroke="#0D9488" stroke-width="2" stroke-linecap="round" opacity="0.45">
    <line x1="180" y1="528" x2="844" y2="528" />
    <line x1="180" y1="548" x2="844" y2="548" />
  </g>

  <!-- 峰顶菱形标记 -->
  <g fill="#0D9488">
    <!-- 左峰 -->
    <polygon points="386,212 394,220 386,228 378,220" />
    <!-- 右峰 -->
    <polygon points="638,232 646,240 638,248 630,240" />
  </g>
</svg>
