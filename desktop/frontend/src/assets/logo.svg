<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="gaeaW">
  <title>gaeaW</title>
  <defs>
    <linearGradient id="earth-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="soil-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#818CF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 深色圆角方形背景 -->
  <rect width="1024" height="1024" rx="200" fill="#0F172A"/>

  <!-- 大地横剖面 — 地表线 -->
  <line x1="212" y1="480" x2="812" y2="480" stroke="url(#earth-line)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 地下分层 — 三条水平弧形线 -->
  <path d="M232 548 Q512 580 792 548" fill="none" stroke="url(#earth-line)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M262 616 Q512 648 762 616" fill="none" stroke="url(#earth-line)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M292 684 Q512 716 732 684" fill="none" stroke="url(#earth-line)" stroke-width="1" opacity="0.15" stroke-linecap="round"/>

  <!-- 土壤填充区域 -->
  <path d="M212 480 Q512 500 812 480 L792 548 Q512 580 232 548 Z" fill="url(#soil-grad)"/>

  <!-- 上方抽象萌芽叶芽 -->
  <!-- 茎 -->
  <line x1="512" y1="480" x2="512" y2="272" stroke="url(#earth-line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 左侧叶片 -->
  <path d="M512 360 Q440 280 384 244 Q430 270 512 360 Z" fill="none" stroke="url(#earth-line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 右侧叶片 -->
  <path d="M512 320 Q584 240 640 204 Q594 230 512 320 Z" fill="none" stroke="url(#earth-line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 中心嫩芽高光点 -->
  <circle cx="512" cy="272" r="6" fill="#818CF8" opacity="0.6" filter="url(#glow)"/>

  <!-- 地表点缀 — 三颗小点代表土壤颗粒 -->
  <circle cx="380" cy="484" r="3" fill="#818CF8" opacity="0.3"/>
  <circle cx="560" cy="486" r="2.5" fill="#818CF8" opacity="0.25"/>
  <circle cx="660" cy="483" r="2" fill="#818CF8" opacity="0.2"/>
</svg>