<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="gaea">
  <title>gaea</title>
  <defs>
    <!-- 主环渐变：indigo → cyan，135° 对角线 -->
    <linearGradient id="ring-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- 发光节点辉光 -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ====== 外环 ====== -->
  <!-- 不完整圆环，右上角开口（从 30°→-30°，经过左侧），形成字母 G 的外廓 -->
  <path d="M 360 316 A 120 120 0 1 0 360 196"
        fill="none" stroke="url(#ring-grad)" stroke-width="28" stroke-linecap="round"/>

  <!-- ====== 内横杠 ====== -->
  <!-- 从圆心水平向右延伸至环边缘，形成 G 的横杠 -->
  <line x1="256" y1="256" x2="376" y2="256"
        stroke="url(#ring-grad)" stroke-width="28" stroke-linecap="round"/>

  <!-- ====== 数据节点 ====== -->

  <!-- 弧起始节点（右下，连接起点） -->
  <circle cx="360" cy="316" r="10" fill="#6366F1"/>
  <circle cx="360" cy="316" r="18" fill="url(#node-glow)" opacity="0.3"/>

  <!-- 圆心节点（G 横杠与环的交汇点） -->
  <circle cx="256" cy="256" r="10" fill="#6366F1"/>
  <circle cx="256" cy="256" r="18" fill="url(#node-glow)" opacity="0.3"/>

  <!-- 弧终点发光节点（右上，数据汇聚） -->
  <circle cx="360" cy="196" r="26" fill="url(#node-glow)"/>
  <circle cx="360" cy="196" r="14" fill="#06B6D4"/>

  <!-- ====== 字标 ====== -->
  <text x="256" y="460" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-weight="600" font-size="80" letter-spacing="-0.02em" fill="#E2E8F0">
    gaea
  </text>
</svg>
