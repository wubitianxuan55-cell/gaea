<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="gaea">
  <title>gaea</title>
  <!-- 深色圆角方底 — 适配系统托盘 -->
  <rect width="32" height="32" rx="7" fill="#1E293B"/>
  <!-- 白色 G 几何图形（外环 + 横杠） -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round">
    <!-- 外环（右上角开口） -->
    <path d="M 22 26 A 10 10 0 1 0 22 6"/>
    <!-- 内横杠 -->
    <line x1="16" y1="16" x2="26" y2="16"/>
  </g>
</svg>
