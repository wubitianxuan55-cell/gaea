# Gaea Docker Compose — personal desktop AI OS
#
#   docker compose up -d
#   → http://localhost:3000

services:
  gaea:
    build: .
    container_name: gaea
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - gaea_data:/app/data
    restart: unless-stopped

volumes:
  gaea_data:
