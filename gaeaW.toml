# gaeaW configuration
# Secrets come from .env via api_key_env; never put keys here.

default_model = "deepseek-pro"

[agent]
max_steps   = 25
temperature = 0.0

[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash"]
api_key_env = "DEEPSEEK_API_KEY"
[providers.price]
cache_hit = 0.02
input     = 1
output    = 2
currency  = "¥"

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-pro"]
api_key_env = "DEEPSEEK_API_KEY"
[providers.price]
cache_hit = 0.025
input     = 3
output    = 6
currency  = "¥"
[[providers]]
name           = "mimo-pro"
# 自有配额走 api 域名（默认 token-plan-cn 为公测域名）
base_url       = "https://api.xiaomimimo.com/v1"
api_key_env    = "MIMO_API_KEY"
context_window = 1_000_000
[providers.price]
cache_hit = 0.25
input     = 1
output    = 4
currency  = "¥"

[[providers]]
name           = "mimo-flash"
kind           = "openai"
base_url       = "https://api.xiaomimimo.com/v1"
models         = ["mimo-v2-flash"]
api_key_env    = "MIMO_API_KEY"
context_window = 65_536
[providers.price]
# flash 定价待确认，暂用 pro 半价作为 placeholder
cache_hit = 0.125
input     = 0.5
output    = 2
currency  = "¥"

[[providers]]
name           = "claude"
kind           = "anthropic"
base_url       = "https://api.x.ai/v1"
models         = ["claude-opus-4-8"]
api_key_env    = "ANTHROPIC_API_KEY"
context_window = 1_000_000
thinking       = "adaptive"
effort         = "high"
[providers.price]
cache_hit = 0.5
input     = 5
output    = 25
currency  = "$"

[[providers]]
name           = "xai-oauth"
kind           = "xai"
base_url       = "https://api.x.ai/v1"
models         = ["grok-4-flash", "grok-4", "grok-4-pro", "grok-4.3"]
api_key_env    = ""
context_window = 1_000_000


# ─── MCP 插件 ──────────────────────────────────────────────

[[plugins]]
name       = "chrome"
command    = "npx"
args       = ["-y", "@modelcontextprotocol/server-puppeteer"]
auto_start = true

[[plugins]]
name       = "github"
command    = "npx"
args       = ["-y", "@modelcontextprotocol/server-github"]
env        = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }
auto_start = true

[[plugins]]
name       = "computer-use"
command    = "uvx"
args       = ["windows-mcp", "serve"]
env        = { ANONYMIZED_TELEMETRY = "false" }
auto_start = true

[[plugins]]
name       = "documents"
command    = "npx"
args       = ["-y", "@modelcontextprotocol/server-filesystem", "C:/Users/吴比"]
auto_start = true

[[plugins]]
name       = "spreadsheets"
command    = "npx"
args       = ["-y", "mcp-google-sheets"]
env        = { GOOGLE_SHEETS_CLIENT_ID = "${GOOGLE_SHEETS_CLIENT_ID}", GOOGLE_SHEETS_CLIENT_SECRET = "${GOOGLE_SHEETS_CLIENT_SECRET}" }
auto_start = true



[office]
# 工程办公配置（待实现：Config 结构体尚未添加 Office 字段）
default_template_dir = "~/.gaeaW/templates"
spec_library_dir = "~/.gaeaW/specs"
unit_system = "SI"  # SI/Metric 或 Imperial
calc_precision = 3  # 计算精度：小数位数
