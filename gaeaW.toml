# gaeaW configuration
# Secrets come from .env via api_key_env; never put keys here.

default_model = "deepseek-pro"

[agent]
max_steps   = 25
temperature = 0.0

[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash"]
api_key_env = "DEEPSEEK_API_KEY"
[providers.price]
cache_hit = 0.02
input     = 1
output    = 2
currency  = "¥"

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-pro"]
api_key_env = "DEEPSEEK_API_KEY"
[providers.price]
cache_hit = 0.025
input     = 3
output    = 6
currency  = "¥"

# ─── MCP 插件 ──────────────────────────────────────────────

[[plugins]]
name       = "chrome"
command    = "npx"
args       = ["-y", "@modelcontextprotocol/server-puppeteer"]
auto_start = true

[[plugins]]
name       = "github"
command    = "npx"
args       = ["-y", "@modelcontextprotocol/server-github"]
env        = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }
auto_start = true

[[plugins]]
name       = "computer-use"
command    = "uvx"
args       = ["windows-mcp", "serve"]
env        = { ANONYMIZED_TELEMETRY = "false" }
auto_start = true

[[plugins]]
name       = "documents"
command    = "npx"
args       = ["-y", "@modelcontextprotocol/server-filesystem", "C:/Users/吴比"]
auto_start = true

[[plugins]]
name       = "spreadsheets"
command    = "npx"
args       = ["-y", "mcp-google-sheets"]
env        = { GOOGLE_SHEETS_CLIENT_ID = "${GOOGLE_SHEETS_CLIENT_ID}", GOOGLE_SHEETS_CLIENT_SECRET = "${GOOGLE_SHEETS_CLIENT_SECRET}" }
auto_start = true

