# gaeaW configuration
# Secrets come from .env via api_key_env; never put keys here.

default_model = "deepseek-pro"

[agent]
max_steps   = 25
temperature = 0.0

[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash"]
api_key_env = "DEEPSEEK_API_KEY"
[providers.price]
cache_hit = 0.02
input     = 1
output    = 2
currency  = "¥"

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-pro"]
api_key_env = "DEEPSEEK_API_KEY"
[providers.price]
cache_hit = 0.025
input     = 3
output    = 6
currency  = "¥"

[[plugins]]
name       = "context7"
command    = "npx"
args       = ["-y", "@upstash/context7-mcp"]
auto_start = true

[office]
# 工程办公配置
default_template_dir = "~/.gaeaW/templates"
spec_library_dir = "~/.gaeaW/specs"
unit_system = "SI"  # SI/Metric 或 Imperial
calc_precision = 3  # 计算精度：小数位数
