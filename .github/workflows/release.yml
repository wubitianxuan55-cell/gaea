name: LumiOS Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: windows
            os: windows-latest
            bundles: nsis
            ext: exe
          - target: macos
            os: macos-latest
            bundles: dmg
            ext: dmg
          - target: linux
            os: ubuntu-latest
            bundles: deb
            ext: deb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g pnpm@11.3.0

      - run: pnpm install --ignore-scripts

      - name: Build desktop frontend
        run: pnpm --filter @lumios/desktop build

      - name: Build server dist
        run: pnpm --filter @lumios/server build

      - name: Bundle Node.js runtime
        run: |
          node -e "
            const fs = require('fs');
            const dest = 'packages/server/dist-server/' + (process.platform === 'win32' ? 'node.exe' : 'node');
            fs.copyFileSync(process.execPath, dest);
            if (process.platform !== 'win32') fs.chmodSync(dest, 0o755);
            console.log('Bundled Node.js', process.version, '->', dest);
          "

      - name: Prepare desktop resources
        run: node scripts/prepare-desktop-resources.mjs

      - name: Ensure .env stub exists (required by tauri bundle.resources)
        run: node -e "require('fs').writeFileSync('packages/desktop/desktop-resources/dist-server/.env','')"

      - name: Skip beforeBuildCommand (already done above)
        run: |
          node -e "
            const fs = require('fs');
            const path = 'packages/desktop/src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            cfg.build.beforeBuildCommand = 'echo tauri-build-already-done';
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2));
          "

      - name: Install Linux system deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev libxcb-shm0-dev libxcb-xkb-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          cd packages/desktop
          pnpm exec tauri build --bundles "${{ matrix.bundles }}" -c src-tauri/tauri.conf.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-${{ matrix.target }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
