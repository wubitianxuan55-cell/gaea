name: LumiOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  rust-build:
    name: Rust backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build frontend dist
        run: npx vite build
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p desktop-resources/dist-server
          mkdir -p desktop-resources/gpt-sovits-src
          mkdir -p desktop-resources/data/voice_training
          touch desktop-resources/dist-server/.gitkeep
          touch desktop-resources/gpt-sovits-src/.gitkeep
          touch desktop-resources/data/voice_training/.gitkeep
          touch desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev
      - name: Check Rust backend
        run: cargo check --release
        working-directory: src-tauri

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx vite build
