name: LumiOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-typecheck:
    name: Server type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - run: cd packages/server && npx tsc --noEmit

  desktop-typecheck:
    name: Desktop type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - run: pnpm --filter @lumios/desktop lint

  web-typecheck:
    name: Web type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - run: pnpm --filter @lumios/web lint

  mobile-typecheck:
    name: Mobile type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - run: pnpm --filter @lumios/mobile lint

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - name: Build frontend dist
        run: pnpm --filter @lumios/desktop build
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p packages/desktop/desktop-resources/dist-server
          mkdir -p packages/desktop/desktop-resources/gpt-sovits-src
          mkdir -p packages/desktop/desktop-resources/data/voice_training
          touch packages/desktop/desktop-resources/dist-server/.gitkeep
          touch packages/desktop/desktop-resources/gpt-sovits-src/.gitkeep
          touch packages/desktop/desktop-resources/data/voice_training/.gitkeep
          touch packages/desktop/desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev libxcb-shm0-dev libxcb-xkb-dev
      - name: Check Rust backend
        id: cargo-check
        run: cargo check --release 2>&1 | tee /tmp/cargo-check.log; exit ${PIPESTATUS[0]}
        working-directory: packages/desktop/src-tauri
      - name: Show Rust errors
        if: failure() && steps.cargo-check.outcome == 'failure'
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/cargo-check.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 /tmp/cargo-check.log | while IFS= read -r line; do
            echo "::error::${line}"
          done

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - run: pnpm --filter @lumios/server test
      - run: pnpm --filter @lumios/web test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --ignore-scripts
      - run: pnpm --filter @lumios/web build
      - run: pnpm --filter @lumios/desktop build
